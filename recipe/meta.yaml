{% set versions = {
    "2.2.0": "b1d40ea429a58b3ffbbb7e5d344b08cf5969650e",
    "1.2.0": "hoppet-1.2.0"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', "hoppet")|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("hoppet-", "")|replace("-", ".") }}

source:
  git_url: "https://github.com/hoppet-code/hoppet"
  # "legacy" (the branch this used to point to) no longer exists
  # upstream; hoppet-1.2.0 is the last tagged pre-2.0 release, kept
  # around because applgrid still depends on this version's API
  # (hoppet_v1.h / libhoppet_v1.a, renamed in the 2.x rewrite).
  git_rev: {{ versions.get(version, "HEAD") }}


build:
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('gfortran') }}   # GNU Fortran compiler
    - {{ compiler('c') }}          # GNU C compiler
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}        # GNU C++ compiler

    {% if version == "1.2.0" %}
    - make                         # Make utility
    - perl                         # 1.2.0's ./configure is a Perl script, not autotools/CMake
    {% else %}
    - cmake                        # Build system
    - make                         # Make utility
    - python
    - sed                          # unit-tests/CMakeLists.txt patch uses `sed -i`; needs GNU semantics
    {% endif %}

  host:
    - lhapdf

  run:
    - lhapdf

about:
  home: "https://github.com/hoppet-code/hoppet"
  license: "GPL-3.0"
  summary: "HOPPET: Higher Order Perturbative Parton Evolution Toolkit"
  description: |
        HOPPET is a Fortran 95 package for carrying out DGLAP evolution and other common manipulations of parton distribution functions (PDFs).

extra:
  recipe-maintainers:
    - meiyasan
  lts:
    main:
      - "1.2.0"   # applgrid pins to this exact pre-2.0 release; the newest-2 auto-trim would otherwise delete it
